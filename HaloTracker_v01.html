<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNSC ACHIEVEMENT TERMINAL — MCC v0.1</title>
<style>
  :root {
    --bg: #0a0c0e;
    --surface: #111518;
    --border: #1e3a2f;
    --cortana: #00d4ff;
    --green: #4cff8f;
    --amber: #ffb347;
    --red: #ff4444;
    --text: #c8d8c8;
    --muted: #5a7a6a;
    --header-bg: #0d1f17;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--header-bg); border-bottom: 2px solid var(--green); padding: 16px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-size: 22px; color: var(--green); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
  .logo span { color: var(--cortana); }
  .tagline { color: var(--muted); font-size: 11px; letter-spacing: 2px; }
  .gamertag-bar { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .gamertag-bar input { background: #0a0c0e; border: 1px solid var(--border); color: var(--cortana); padding: 6px 10px; font-family: inherit; font-size: 13px; width: 160px; }
  .gamertag-bar button { background: var(--green); color: #000; border: none; padding: 6px 12px; font-family: inherit; font-size: 12px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }

  /* OVERALL PROGRESS */
  .overall { background: var(--surface); border: 1px solid var(--border); margin: 16px; padding: 16px; }
  .overall-title { color: var(--cortana); font-size: 11px; letter-spacing: 3px; margin-bottom: 10px; }
  .stats-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { text-align: center; }
  .stat-val { font-size: 28px; color: var(--green); font-weight: bold; }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .progress-bar { height: 8px; background: #1a2a1f; border: 1px solid var(--border); border-radius: 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--cortana)); transition: width 0.5s; }

  /* GAME TABS */
  .tabs { display: flex; gap: 0; padding: 0 16px; overflow-x: auto; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; font-family: inherit; font-size: 11px; letter-spacing: 2px; background: none; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; text-transform: uppercase; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab:hover { color: var(--text); }

  /* GAME PANEL */
  .game-panel { display: none; padding: 16px; }
  .game-panel.active { display: block; }
  .game-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .game-title { font-size: 18px; color: var(--green); letter-spacing: 2px; }
  .game-subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .game-progress { text-align: right; }
  .game-pct { font-size: 24px; color: var(--cortana); font-weight: bold; }

  /* MODE SECTIONS */
  .mode-section { margin-bottom: 20px; }
  .mode-header { background: var(--header-bg); border-left: 3px solid var(--cortana); padding: 8px 12px; margin-bottom: 8px; font-size: 11px; letter-spacing: 3px; color: var(--cortana); text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; }
  .mode-header:hover { background: #0d1f17; }

  /* LEVEL SECTIONS */
  .level-section { margin-bottom: 12px; padding-left: 12px; border-left: 1px solid var(--border); }
  .level-name { font-size: 10px; letter-spacing: 2px; color: var(--amber); margin-bottom: 6px; text-transform: uppercase; }

  /* ACHIEVEMENT ROW */
  .ach { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; margin-bottom: 4px; }
  .ach:hover { background: #111e16; border-color: var(--border); }
  .ach.done { opacity: 0.45; }
  .ach-check { width: 18px; height: 18px; border: 2px solid var(--muted); background: none; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .ach.done .ach-check { border-color: var(--green); background: var(--green); color: #000; }
  .ach-icon { font-size: 18px; flex-shrink: 0; }
  .ach-body { flex: 1; }
  .ach-name { font-size: 13px; color: var(--text); font-weight: bold; }
  .ach-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ach-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 9px; padding: 2px 6px; letter-spacing: 1px; font-weight: bold; }
  .badge-gs { background: #1a2a1f; color: var(--green); border: 1px solid var(--border); }
  .badge-easy { background: #1a2a1f; color: #4cff8f; }
  .badge-med { background: #1f1a0a; color: var(--amber); }
  .badge-hard { background: #1f0a0a; color: #ff8844; }
  .badge-vhard { background: #2a0a0a; color: var(--red); }
  .badge-miss { background: #2a0a0a; color: var(--red); border: 1px solid var(--red); }
  .badge-coop { background: #0a1a2a; color: var(--cortana); }
  .ach-guide { display: none; font-size: 11px; color: var(--text); background: #0d1209; border-left: 3px solid var(--green); padding: 8px 10px; margin-top: 6px; line-height: 1.6; }
  .ach.expanded .ach-guide { display: block; }
  .ach-gs { font-size: 13px; color: var(--green); font-weight: bold; flex-shrink: 0; margin-left: auto; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar input { background: #0a0c0e; border: 1px solid var(--border); color: var(--text); padding: 6px 10px; font-family: inherit; font-size: 12px; flex: 1; min-width: 160px; }
  .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; font-family: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer; }
  .filter-btn.active { border-color: var(--green); color: var(--green); }

  /* RANK BANNER */
  .rank-banner { background: linear-gradient(135deg, #0d1f17, #0a0c0e); border: 1px solid var(--green); padding: 10px 16px; margin: 0 16px 16px; display: flex; align-items: center; gap: 12px; }
  .rank-icon { font-size: 28px; }
  .rank-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .rank-name { font-size: 16px; color: var(--green); font-weight: bold; letter-spacing: 2px; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--header-bg); border: 2px solid var(--green); color: var(--green); padding: 10px 20px; font-size: 12px; letter-spacing: 2px; display: none; z-index: 999; text-align: center; max-width: 90vw; }
  .toast.show { display: block; animation: fadeInOut 3s forwards; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }

  @media(max-width:500px){ .stats-row{gap:12px} .stat-val{font-size:22px} .logo{font-size:16px} }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">UNSC <span>ACHIEVEMENT</span> TERMINAL</div>
    <div class="tagline">HALO: MASTER CHIEF COLLECTION — v0.1 FIELD DRAFT</div>
  </div>
  <div class="gamertag-bar">

    <div class="rank-name" id="rankName">RECRUIT</div>
  </div>
  <div style="margin-left:auto;text-align:right">
    <div style="font-size:10px;color:var(--muted);letter-spacing:2px">SPARTAN ID</div>
    <div style="font-size:14px;color:var(--cortana)" id="gamertagDisplay">—</div>

<div class="overall">

  <div class="stats-row">

    <div class="stat"><div class="stat-val" id="totalDone">0</div><div class="stat-lbl">UNLOCKED</div></div>

  </div>
  <div class="progress-bar"><div class="progress-fill" id="overallBar" style="width:0%"></div></div>
</div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div class="toast" id="toast"></div>

// ─── STATE ────────────────────────────────────────────────────────────────────
let done = JSON.parse(localStorage.getItem('halo_done')||'{}');
let gamertag = localStorage.getItem('halo_gt')||'';
let activeGame = 'ce';
let filterStatus = 'all';
let searchQuery = '';

// ─── RANKS ────────────────────────────────────────────────────────────────────
const RANKS = [
  {pct:0,  name:'RECRUIT',        icon:'🪖'},
  {pct:5,  name:'PRIVATE',        icon:'🟢'},
  {pct:15, name:'CORPORAL',       icon:'🟡'},
  {pct:25, name:'SERGEANT',       icon:'🔴'},
  {pct:40, name:'LIEUTENANT',     icon:'⭐'},
  {pct:55, name:'CAPTAIN',        icon:'🌟'},
  {pct:70, name:'MAJOR',          icon:'💫'},
  {pct:80, name:'COLONEL',        icon:'🎖️'},
  {pct:90, name:'COMMANDER',      icon:'🏅'},
  {pct:95, name:'SPARTAN',        icon:'🤖'},
  {pct:99, name:'MASTER CHIEF',   icon:'🟢🪖'},
  {pct:100,name:'LEGENDARY 117',  icon:'🏆'},
];

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  if(gamertag){ document.getElementById('gamertagInput').value=gamertag; document.getElementById('gamertagDisplay').textContent=gamertag; }
  buildTabs();
  buildAllPanels();
  updateOverall();
}

function buildTabs(){
  const tc = document.getElementById('tabs');
  GAMES.forEach(g=>{
    const btn = document.createElement('button');
    btn.className='tab'+(g.id===activeGame?' active':'');
    btn.textContent=g.title;
    btn.onclick=()=>switchGame(g.id);
    tc.appendChild(btn);
  });
}

function switchGame(id){
  activeGame=id;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',GAMES[i].id===id));
  document.querySelectorAll('.game-panel').forEach(p=>p.classList.toggle('active',p.dataset.game===id));
}

function buildAllPanels(){
  const pc = document.getElementById('panels');
  GAMES.forEach(g=>{
    const panel = document.createElement('div');
    panel.className='game-panel'+(g.id===activeGame?' active':'');
    panel.dataset.game=g.id;
    panel.innerHTML = buildGamePanel(g);
    pc.appendChild(panel);
  });
  // Attach listeners
  document.querySelectorAll('.ach').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.closest('.ach-check')) toggleAch(el.dataset.id);
      else el.classList.toggle('expanded');
    });
  });
}

function buildGamePanel(g){
  const achs = ACHIEVEMENTS[g.id]||[];
  const modes = {};
  achs.forEach(a=>{ if(!modes[a.mode]) modes[a.mode]={}; if(!modes[a.mode][a.level]) modes[a.mode][a.level]=[]; modes[a.mode][a.level].push(a); });
  const total=achs.length, doneCount=achs.filter(a=>done[a.id]).length;
  const pct=total?Math.round(doneCount/total*100):0;
  const modeLabels={'campaign':'⚔️ CAMPAIGN','multiplayer':'🌐 MULTIPLAYER','firefight':'🔥 FIREFIGHT','spartan_ops':'🛸 SPARTAN OPS','meta':'🏅 COLLECTION','laso':'💀 LASO'};
  let html=`<div class="game-header"><div><div class="game-title">${g.title}</div><div class="game-subtitle">${g.subtitle}</div></div><div class="game-progress"><div class="game-pct">${pct}%</div><div style="font-size:11px;color:var(--muted);letter-spacing:2px">${doneCount}/${total}</div></div></div>`;
  html+=`<div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${g.color},var(--cortana))"></div></div>`;
  html+=`<div class="filter-bar"><input type="text" placeholder="🔍 SEARCH ACHIEVEMENTS..." oninput="filterSearch(this.value,'${g.id}')" id="search_${g.id}"><button class="filter-btn active" onclick="setFilter('all','${g.id}',this)">ALL</button><button class="filter-btn" onclick="setFilter('todo','${g.id}',this)">TODO</button><button class="filter-btn" onclick="setFilter('done','${g.id}',this)">DONE</button><button class="filter-btn" onclick="setFilter('miss','${g.id}',this)">⚠️ MISSABLE</button></div>`;
  Object.entries(modes).forEach(([mode,levels])=>{
    html+=`<div class="mode-section"><div class="mode-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">${modeLabels[mode]||mode.toUpperCase()}<span>▾</span></div><div>`;
    Object.entries(levels).forEach(([level,as])=>{
      html+=`<div class="level-section"><div class="level-name">${level}</div>`;
      as.forEach(a=>{ html+=buildAch(a); });
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}

function buildAch(a){
  const isDone=done[a.id];
  const diffMap={easy:'easy',med:'med',hard:'hard',vhard:'vhard'};
  const diffLabel={easy:'EASY',med:'MEDIUM',hard:'HARD',vhard:'VERY HARD'};
  return `<div class="ach${isDone?' done':''}" data-id="${a.id}" data-miss="${a.missable?'1':'0'}">
    <div class="ach-check">${isDone?'✓':''}</div>
    <div class="ach-icon">${a.icon}</div>
    <div class="ach-body">
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-meta">
        <span class="badge badge-gs">⚡${a.gs}G</span>
        <span class="badge badge-${diffMap[a.diff]}">${diffLabel[a.diff]}</span>
        ${a.missable?'<span class="badge badge-miss">⚠️ MISSABLE</span>':''}
        ${a.coop?'<span class="badge badge-coop">👥 CO-OP</span>':''}
        <span class="badge" style="color:var(--muted)">⏱ ~${a.time}h</span>
      </div>
      <div class="ach-guide">${a.guide}</div>
    </div>
    <div class="ach-gs">${a.gs}G</div>
  </div>`;
}

function toggleAch(id){
  done[id]=!done[id];
  localStorage.setItem('halo_done',JSON.stringify(done));
  const el=document.querySelector(`.ach[data-id="${id}"]`);
  if(el){
    el.classList.toggle('done',done[id]);
    const chk=el.querySelector('.ach-check');
    chk.textContent=done[id]?'✓':'';
    if(done[id]){ const name=el.querySelector('.ach-name').textContent; showToast(`✅ UNLOCKED: ${name}`); playChime(); }
  }
  updateOverall();
  updateGamePct();
}

function updateGamePct(){
  const achs=ACHIEVEMENTS[activeGame]||[];
  const total=achs.length,doneCount=achs.filter(a=>done[a.id]).length;
  const pct=total?Math.round(doneCount/total*100):0;
  const panel=document.querySelector(`.game-panel[data-game="${activeGame}"]`);
  if(panel){ const p=panel.querySelector('.game-pct'); if(p) p.textContent=pct+'%'; }
}

function updateOverall(){
  const all=Object.values(ACHIEVEMENTS).flat();
  const total=all.length,doneCount=all.filter(a=>done[a.id]).length;
  const pct=total?Math.round(doneCount/total*100):0;
  const gs=all.filter(a=>done[a.id]).reduce((s,a)=>s+a.gs,0);
  const maxGs=all.reduce((s,a)=>s+a.gs,0);
  const hoursLeft=all.filter(a=>!done[a.id]).reduce((s,a)=>s+a.time,0);
  document.getElementById('totalPct').textContent=pct+'%';
  document.getElementById('totalDone').textContent=doneCount;
  document.getElementById('totalLeft').textContent=total-doneCount;
  document.getElementById('totalGS').textContent=gs+'G';
  document.getElementById('hoursLeft').textContent=Math.round(hoursLeft)+'h';
  document.getElementById('overallBar').style.width=pct+'%';
  // Rank
  let rank=RANKS[0];
  for(const r of RANKS){ if(pct>=r.pct) rank=r; }
  document.getElementById('rankName').textContent=rank.name;
  document.getElementById('rankIcon').textContent=rank.icon;
}

function filterSearch(q,game){
  searchQuery=q.toLowerCase();
  applyFilters(game);
}
function setFilter(f,game,btn){
  filterStatus=f;
  document.querySelectorAll(`[data-game="${game}"] .filter-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters(game);
}
function applyFilters(game){
  const panel=document.querySelector(`.game-panel[data-game="${game}"]`);
  if(!panel) return;
  panel.querySelectorAll('.ach').forEach(el=>{
    const id=el.dataset.id;
    const isDone=done[id];
    const isMiss=el.dataset.miss==='1';
    const name=el.querySelector('.ach-name').textContent.toLowerCase();
    const matchSearch=!searchQuery||name.includes(searchQuery);
    const matchFilter=filterStatus==='all'||(filterStatus==='done'&&isDone)||(filterStatus==='todo'&&!isDone)||(filterStatus==='miss'&&isMiss);
    el.style.display=(matchSearch&&matchFilter)?'':'none';
  });
}

function saveGamertag(){
  gamertag=document.getElementById('gamertagInput').value.trim();
  localStorage.setItem('halo_gt',gamertag);
  document.getElementById('gamertagDisplay').textContent=gamertag||'—';
  showToast('SPARTAN ID SAVED: '+gamertag);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast';
  void t.offsetWidth;
  t.className='toast show';
}

function playChime(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(880,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200,a.currentTime+0.15);
    g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.4);
  }catch(e){}
}

init();
</script>
</body>
